<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "MOTW 技術支援中心" }}</title>
  <style>
    /* 1. 基礎設定：模仿 WebTech 的乾淨風格 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      overflow-x: hidden; 
      background-color: #fcfcfc; /* 極淺灰底，襯托白色內容 */
      font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
      color: #333;
    }

    /* 2. 凍結導覽列 (Sticky Header) */
    nav {
      background: #ffffff; /* 改為白底紅字，更有 WebTech 的精緻感 */
      padding: 0;
      position: fixed; /* 強制凍結在最上方 */
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      box-shadow: 0 2px 15px rgba(0,0,0,0.08);
      border-bottom: 3px solid #D21F3C; /* 底部細紅線 */
    }

    .nav-container {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      height: 70px; /* 固定高度 */
      padding: 0 20px;
    }

    .nav-logo {
      font-weight: 900;
      color: #D21F3C;
      font-size: 1.4em;
      text-decoration: none;
      letter-spacing: 1px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
    }

    .nav-links a {
      color: #555;
      text-decoration: none;
      font-weight: 500;
      font-size: 1em;
      transition: 0.3s;
      padding: 10px 0;
    }

    .nav-links a:hover {
      color: #D21F3C;
    }

    /* 3. 內容區塊位移：因為 Header 凍結了，內容要往下推 70px 避免被遮住 */
    main {
      max-width: 1100px;
      margin: 100px auto 50px; /* 上方邊距增加到 100px */
      padding: 0 20px;
      min-height: 80vh;
      background: transparent;
    }

    /* 4. 響應式優化 */
    @media (max-width: 768px) {
      .nav-container { height: 60px; padding: 0 15px; }
      .nav-links { gap: 15px; }
      .nav-links a { font-size: 0.9em; }
      main { margin-top: 80px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="nav-container">
      <a href="/TWsoftware-FAQ/" class="nav-logo">HILTI MOTW</a>
      <div class="nav-links">
        <a href="/TWsoftware-FAQ/">🏠 首頁</a>
        <a href="/TWsoftware-FAQ/blog.html">📰 文獻</a>
        <a href="/TWsoftware-FAQ/faq.html">❓ FAQ</a>
      </div>
    </div>
  </nav>

  <main>
    {{ content }}
  </main>

  <footer style="text-align: center; padding: 40px 0; color: #999; font-size: 0.8em; border-top: 1px solid #eee;">
    © 2026 MOTW Engineering Support Team
  </footer>

</body>
</html>
