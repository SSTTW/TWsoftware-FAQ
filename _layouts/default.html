<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: "MOTW 技術支援中心" }}</title>
  <style>
    /* 強制清除 GitHub 預設的干擾邊距，並防止任何元素撐破手機螢幕 */
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      max-width: 100vw;
      overflow-x: hidden; 
      background-color: #ffffff;
    }
    
    /* 讓整個主要內容區塊在手機上能有適當的呼吸空間 */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 15px;
    }
  </style>
</head>
<body>
  <main>
    {{ content }}
  </main>
</body>
</html>
